<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Rutin Komuta Merkezi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F5F1E8;
    --paper-2:#EFEADD;
    --card:#FCFAF4;
    --ink:#1C1A17;
    --muted:#736C61;
    --faint:#A39C8E;
    --line:#E4DDCD;
    --line-strong:#D6CDB8;
    --good:#5C7A52;
    --shadow:0 1px 2px rgba(28,26,23,.04), 0 8px 30px rgba(28,26,23,.06);
    /* default accent (overridden per company) */
    --accent:#1C1A17;
    --accent-soft:#736C61;
    --accent-tint:#EFEADD;
    font-synthesis:none;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
    min-height:100vh;
  }
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace}
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--faint);
    font-weight:500;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  button:focus-visible, [tabindex]:focus-visible, input:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:2px;
    border-radius:4px;
  }
  .wrap{max-width:1080px;margin:0 auto;padding:32px 24px 80px}

  /* ---------- MASTHEAD ---------- */
  .masthead{
    display:flex;align-items:flex-end;justify-content:space-between;
    gap:24px;flex-wrap:wrap;
    padding-bottom:20px;margin-bottom:32px;
    border-bottom:1px solid var(--line);
  }
  .masthead h1{
    font-family:'Fraunces',Georgia,serif;
    font-weight:500;
    font-size:clamp(26px,4.2vw,40px);
    line-height:1.04;
    letter-spacing:-.01em;
    margin:6px 0 0;
  }
  .masthead .date{margin-top:4px}
  .title-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:6px}
  .title-row h1{margin:0}
  .mini-toggle{display:inline-flex;gap:3px;background:var(--paper-2);padding:4px;border-radius:10px}
  .mini-toggle button{padding:7px 13px;border-radius:7px;font-size:12.5px;font-weight:500;color:var(--muted);display:flex;align-items:center;gap:7px;transition:all .15s ease}
  .mini-toggle button.on{background:var(--card);color:var(--ink);box-shadow:0 1px 2px rgba(28,26,23,.07)}
  .mt-count{font-family:'JetBrains Mono',monospace;font-size:10.5px;background:var(--accent-tint,#EFEADD);color:var(--accent);padding:1px 6px;border-radius:99px}
  .mini-toggle button.on .mt-count{background:#A45D4E;color:#fff}
  .brief-stat{
    text-align:right;
    border-left:1px solid var(--line);
    padding-left:20px;
  }
  .brief-stat .num{
    font-family:'Fraunces',serif;
    font-size:40px;line-height:1;font-weight:500;
  }
  .brief-stat .num.done{color:var(--faint)}
  .brief-stat .lbl{margin-top:6px;max-width:150px;margin-left:auto}

  /* ---------- HOME GRID ---------- */
  .grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:13px;
  }
  @media(max-width:680px){.grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:430px){.grid{grid-template-columns:1fr}}
  .firm{
    --c:var(--accent);
    --ct:var(--accent-tint);
    background:var(--card);
    border:1px solid var(--line);
    border-radius:18px;
    padding:18px;
    text-align:left;
    display:flex;flex-direction:column;gap:16px;
    box-shadow:var(--shadow);
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    position:relative;overflow:hidden;
    min-height:228px;
  }
  .firm::before{
    content:"";position:absolute;inset:0 0 auto 0;height:4px;background:var(--c);
  }
  .firm:hover{transform:translateY(-3px);box-shadow:0 2px 4px rgba(28,26,23,.05),0 18px 44px rgba(28,26,23,.10);border-color:var(--line-strong)}
  .firm-top{display:flex;align-items:center;gap:14px}
  .logo{
    width:48px;height:48px;flex:none;border-radius:13px;
    background:var(--ct);
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
    border:1px solid color-mix(in srgb, var(--c) 22%, transparent);
  }
  .logo img{width:100%;height:100%;object-fit:cover}
  .logo .mono-mark{
    font-family:'Fraunces',serif;font-weight:600;font-size:21px;color:var(--c);
  }
  .firm-name{font-family:'Fraunces',serif;font-weight:500;font-size:18px;line-height:1.08;letter-spacing:-.01em}
  .firm-type{margin-top:3px}
  .firm-rows{display:flex;flex-direction:column;gap:10px;margin-top:auto}
  .frow{display:grid;grid-template-columns:58px 1fr auto;align-items:center;gap:9px}
  .frow .flbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-family:'JetBrains Mono',monospace}
  .bar{height:6px;border-radius:99px;background:var(--paper-2);overflow:hidden}
  .bar i{display:block;height:100%;background:var(--c);border-radius:99px;transition:width .4s ease}
  .frac{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink);white-space:nowrap;font-weight:500}
  .frac em{color:var(--faint);font-style:normal}
  .firm-cta{
    margin-top:4px;display:flex;align-items:center;gap:8px;
    font-size:13px;font-weight:500;color:var(--c);
  }
  .firm-cta svg{transition:transform .18s ease}
  .firm:hover .firm-cta svg{transform:translateX(4px)}

  /* gear on card */
  .firm-gear{
    position:absolute;top:16px;right:16px;z-index:2;
    width:30px;height:30px;border-radius:8px;
    color:var(--faint);display:flex;align-items:center;justify-content:center;
    opacity:0;transition:opacity .18s ease, background .15s ease;
  }
  .firm:hover .firm-gear{opacity:1}
  .firm-gear:hover{background:var(--paper-2);color:var(--ink)}

  /* ---------- COMPANY VIEW ---------- */
  .cv{ --c:var(--accent); --ct:var(--accent-tint); }
  .backbtn{
    display:inline-flex;align-items:center;gap:8px;
    font-size:13px;color:var(--muted);font-weight:500;
    padding:8px 12px;border-radius:9px;margin-bottom:18px;
    transition:background .15s ease,color .15s ease;
  }
  .backbtn:hover{background:var(--paper-2);color:var(--ink)}
  .cv-head{
    display:flex;align-items:center;gap:18px;
    padding-bottom:22px;margin-bottom:6px;
    border-bottom:1px solid var(--line);
    flex-wrap:wrap;
  }
  .cv-head .logo{width:64px;height:64px;border-radius:16px}
  .cv-head .logo .mono-mark{font-size:28px}
  .cv-title h2{font-family:'Fraunces',serif;font-weight:500;font-size:30px;margin:2px 0 0;letter-spacing:-.01em;line-height:1.05}
  .cv-head .spacer{flex:1}
  .icon-btn{
    width:40px;height:40px;border-radius:11px;border:1px solid var(--line);
    background:var(--card);color:var(--muted);
    display:flex;align-items:center;justify-content:center;
    transition:all .15s ease;
  }
  .icon-btn:hover{border-color:var(--line-strong);color:var(--ink);background:var(--paper-2)}

  /* 7-day strip */
  .week-strip{display:flex;gap:6px;align-items:center;margin:22px 0 4px}
  .week-strip .wlbl{margin-right:6px}
  .dchip{
    width:30px;height:34px;border-radius:8px;border:1px solid var(--line);
    background:var(--card);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:1px;
  }
  .dchip .dd{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
  .dchip .dot{width:7px;height:7px;border-radius:99px;background:var(--line-strong)}
  .dchip.full{background:var(--ct);border-color:color-mix(in srgb,var(--c) 30%,transparent)}
  .dchip.full .dot{background:var(--c)}
  .dchip.part .dot{background:color-mix(in srgb,var(--c) 55%,var(--line-strong))}
  .dchip.today{box-shadow:0 0 0 2px color-mix(in srgb,var(--c) 35%,transparent)}

  /* tabs */
  .tabs{display:flex;flex-wrap:wrap;gap:4px;margin:24px 0 18px;background:var(--paper-2);padding:5px;border-radius:13px;width:fit-content;max-width:100%}
  .tab{
    padding:9px 18px;border-radius:9px;font-size:13.5px;font-weight:500;color:var(--muted);
    display:flex;align-items:center;gap:9px;transition:all .15s ease;
  }
  .tab svg{flex:none}
  .tab-div{width:1px;align-self:stretch;background:var(--line-strong);margin:4px 3px;opacity:.7}
  .tab .tcount{
    font-family:'JetBrains Mono',monospace;font-size:11px;
    background:var(--paper);color:var(--muted);
    padding:1px 7px;border-radius:99px;
  }
  .tab.active{background:var(--card);color:var(--ink);box-shadow:0 1px 2px rgba(28,26,23,.06)}
  .tab.active .tcount{background:var(--ct);color:var(--c)}

  /* progress line */
  .prog{display:flex;align-items:center;gap:14px;margin-bottom:20px}
  .prog .pbar{flex:1;height:8px;border-radius:99px;background:var(--paper-2);overflow:hidden}
  .prog .pbar i{display:block;height:100%;background:var(--c);border-radius:99px;transition:width .4s ease}
  .prog .ptxt{font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--muted);font-weight:500}
  .prog .ptxt b{color:var(--ink);font-weight:600}

  /* routine list */
  .rlist{display:flex;flex-direction:column;gap:9px}
  .ritem{
    display:flex;align-items:flex-start;gap:14px;
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:16px 16px 16px 18px;
    transition:border-color .15s ease, background .15s ease;
  }
  .ritem:hover{border-color:var(--line-strong)}
  .ritem.done{background:transparent;border-style:dashed}
  .check{
    width:24px;height:24px;flex:none;margin-top:1px;border-radius:8px;
    border:2px solid var(--line-strong);background:var(--card);
    display:flex;align-items:center;justify-content:center;
    transition:all .15s ease;
  }
  .check:hover{border-color:var(--c)}
  .check svg{opacity:0;transform:scale(.5);transition:all .15s ease;color:#fff}
  .ritem.done .check{background:var(--c);border-color:var(--c)}
  .ritem.done .check svg{opacity:1;transform:scale(1)}
  .rbody{flex:1;min-width:0}
  .rtitle{font-size:15px;font-weight:500;line-height:1.35;transition:color .15s ease}
  .ritem.done .rtitle{color:var(--faint);text-decoration:line-through;text-decoration-color:var(--line-strong)}
  .rnote{font-size:13px;color:var(--muted);margin-top:3px;line-height:1.4}
  .rmeta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--faint);margin-top:7px}
  .rmenu-btn{
    width:30px;height:30px;flex:none;border-radius:8px;color:var(--faint);
    display:flex;align-items:center;justify-content:center;opacity:0;transition:all .15s ease;
  }
  .ritem:hover .rmenu-btn{opacity:1}
  .rmenu-btn:hover{background:var(--paper-2);color:var(--ink)}
  .wday-btn{padding:6px 10px;border-radius:8px;border:1.5px solid var(--line);font-size:12px;font-weight:600;color:var(--muted);background:var(--card);transition:all .15s}
  .wday-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}

  .add-row{margin-top:14px}
  .add-btn{
    width:100%;border:1.5px dashed var(--line-strong);border-radius:14px;
    padding:15px;color:var(--muted);font-size:14px;font-weight:500;
    display:flex;align-items:center;justify-content:center;gap:9px;
    transition:all .15s ease;background:transparent;
  }
  .add-btn:hover{border-color:var(--c);color:var(--c);background:var(--ct)}

  .empty{
    text-align:center;padding:48px 20px;color:var(--muted);
    border:1px dashed var(--line-strong);border-radius:16px;background:var(--card);
  }
  .empty .ico{font-size:26px;margin-bottom:8px;opacity:.5}

  /* section selection panels */
  .secgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-top:26px}
  @media(max-width:720px){.secgrid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:460px){.secgrid{grid-template-columns:1fr}}
  .secpanel{
    --c:var(--accent);
    text-align:left;background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:20px;display:flex;flex-direction:column;gap:14px;
    box-shadow:var(--shadow);transition:transform .16s ease,border-color .16s ease,box-shadow .16s ease;min-height:140px;
  }
  .secpanel:hover{transform:translateY(-2px);border-color:var(--line-strong);box-shadow:0 2px 4px rgba(28,26,23,.05),0 14px 36px rgba(28,26,23,.09)}
  .secpanel-top{display:flex;align-items:center;gap:12px}
  .seckey{font-size:12px;color:var(--c);letter-spacing:.1em}
  .secname{font-family:'Fraunces',serif;font-size:20px;font-weight:500;letter-spacing:-.01em;flex:1}
  .secpanel-top svg{color:var(--faint);transition:transform .16s ease}
  .secpanel:hover .secpanel-top svg{transform:translateX(4px);color:var(--c)}
  .secbar{height:7px;border-radius:99px;background:var(--paper-2);overflow:hidden;margin-top:auto}
  .secbar i{display:block;height:100%;background:var(--c);border-radius:99px;transition:width .4s ease}
  .secmeta{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .seclbl{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--c);background:var(--accent-tint);padding:2px 8px;border-radius:99px}
  .sechdr{margin:26px 0 12px;padding-top:18px;border-top:1px solid var(--line)}
  .cal-hint{margin-top:14px;color:var(--muted);text-align:center}
  .firm-link{
    --accent:#1C1A17;--accent-tint:#EFEADD;
    display:flex;align-items:center;gap:15px;text-decoration:none;
    margin-top:22px;padding:16px 18px;border-radius:14px;
    background:var(--accent-tint);border:1px solid color-mix(in srgb,var(--accent) 22%,transparent);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .firm-link:hover{transform:translateY(-2px);box-shadow:0 10px 26px color-mix(in srgb,var(--accent) 20%,transparent)}
  .fl-ico{width:44px;height:44px;flex:none;border-radius:11px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center}
  .fl-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
  .fl-title{font-family:'Fraunces',serif;font-size:17px;font-weight:500;color:var(--ink)}
  .fl-url{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--accent);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .fl-go{flex:none;color:var(--accent)}

  /* calendar */
  .cal{margin-top:20px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:var(--shadow)}
  .cal-head{display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:14px}
  .cal-title{font-family:'Fraunces',serif;font-size:19px;font-weight:500;min-width:170px;text-align:center;text-transform:capitalize}
  .cal-nav{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .15s ease}
  .cal-nav:hover{background:var(--paper-2);color:var(--ink);border-color:var(--line-strong)}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .cal-wd{margin-bottom:6px}
  .cal-wlbl{text-align:center;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.06em;color:var(--faint);text-transform:uppercase;padding:2px 0}
  .cal-cell{
    min-height:62px;border-radius:10px;border:1px solid var(--line);background:var(--paper);
    padding:6px 7px;text-align:left;display:flex;flex-direction:column;gap:3px;overflow:hidden;
    transition:all .14s ease;
  }
  .cal-cell.empty{background:transparent;border-color:transparent;pointer-events:none}
  .cal-cell:not(.empty):hover{border-color:var(--accent);background:var(--card)}
  .cal-num{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);font-weight:500}
  .cal-cell.today{box-shadow:0 0 0 2px color-mix(in srgb,var(--accent) 40%,transparent) inset}
  .cal-cell.today .cal-num{color:var(--accent);font-weight:600}
  .cal-cell.hasnote{background:var(--accent-tint);border-color:color-mix(in srgb,var(--accent) 26%,transparent)}
  .cal-note{font-size:10.5px;line-height:1.25;color:var(--ink);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  @media(max-width:560px){.cal-cell{min-height:48px}.cal-note{display:none}.cal{padding:12px}}

  /* home sections */
  .home-sec{margin-top:40px}
  .home-sec-head{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--line)}
  .home-sec-head .eyebrow{font-size:12px;letter-spacing:.14em}
  .sec-add{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:500;color:var(--muted);padding:8px 13px;border-radius:10px;border:1px solid var(--line);background:var(--card);transition:all .15s ease}
  .sec-add:hover{border-color:var(--line-strong);color:var(--ink);background:var(--paper-2)}
  .rem-shortcut{position:relative;display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:12px;border:1.5px solid #C4B5D9;background:#EDE8F5;color:#7C5C9F;transition:all .15s ease;flex-shrink:0}
  .rem-shortcut svg{width:22px;height:22px}
  .rem-shortcut:hover{background:#DDD4F0;border-color:#7C5C9F}
  .rem-badge{position:absolute;top:-5px;right:-5px;min-width:16px;height:16px;background:#7C5C9F;color:#fff;border-radius:99px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 3px;border:2px solid var(--bg)}
  .empty.mini{padding:28px 20px}

  /* enterable entry panel */
  .entry-panel{
    --accent:#5C7A52;--accent-tint:#E6ECE2;
    width:100%;margin-top:40px;text-align:left;
    display:flex;align-items:center;gap:18px;
    background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:20px 22px;box-shadow:var(--shadow);
    transition:transform .16s ease,border-color .16s ease,box-shadow .16s ease;
  }
  .entry-panel:hover{transform:translateY(-2px);border-color:var(--line-strong);box-shadow:0 2px 4px rgba(28,26,23,.05),0 14px 36px rgba(28,26,23,.09)}
  .entry-ico{width:50px;height:50px;flex:none;border-radius:13px;background:var(--accent-tint);color:var(--accent);display:flex;align-items:center;justify-content:center}
  .entry-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
  .entry-title{font-family:'Fraunces',serif;font-size:20px;font-weight:500;letter-spacing:-.01em}
  .entry-sum{font-size:13px;color:var(--muted)}
  .entry-panel > svg{color:var(--faint);transition:transform .16s ease;flex:none}
  .entry-panel:hover > svg{transform:translateX(4px);color:var(--accent)}

  /* bills */
  .billlist{display:flex;flex-direction:column;gap:8px}
  .bill{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px 14px 13px 16px;transition:border-color .15s ease}
  .bill:hover{border-color:var(--line-strong)}
  .bill.paid{background:transparent;border-style:dashed}
  .bcheck{width:24px;height:24px;flex:none;border-radius:8px;border:2px solid var(--line-strong);background:var(--card);display:flex;align-items:center;justify-content:center;transition:all .15s ease}
  .bcheck:hover{border-color:var(--good)}
  .bcheck svg{opacity:0;transform:scale(.5);transition:all .15s ease;color:#fff}
  .bill.paid .bcheck{background:var(--good);border-color:var(--good)}
  .bill.paid .bcheck svg{opacity:1;transform:scale(1)}
  .bbody{flex:1;min-width:0;cursor:pointer}
  .bname{font-size:14.5px;font-weight:500;line-height:1.3}
  .bill.paid .bname{color:var(--faint);text-decoration:line-through;text-decoration-color:var(--line-strong)}
  .bmeta{display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap}
  .bday{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--faint)}
  .btag{font-size:11px;font-weight:500;padding:2px 8px;border-radius:99px;background:var(--paper-2);color:var(--muted)}
  .btag.genel{background:var(--paper-2);color:var(--muted)}
  .bstat{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
  .bstat.overdue{color:#A4453B;font-weight:600}
  .bstat.soon{color:var(--accent);font-weight:600}
  .bstat.paid{color:var(--good)}
  .bamt{font-family:'JetBrains Mono',monospace;font-size:14.5px;font-weight:600;white-space:nowrap}
  .bill.paid .bamt{color:var(--faint)}
  .bamt.neg{color:#A4453B}
  .bamt.pos{color:#5C7A52}
  .bill.paid .bamt.neg,.bill.paid .bamt.pos{color:var(--faint)}
  .qtag{font-family:'Inter',sans-serif;font-size:10.5px;font-weight:600;padding:1px 7px;border-radius:99px;vertical-align:middle;margin-left:4px}
  .qtag.verilen{background:#F6E6E3;color:#A4453B}
  .qtag.alinan{background:#E6ECE2;color:#4f6b46}
  .qtag.sahsi{background:#F1E7D6;color:#B07B3E}
  .qtag.ticari{background:#E3E6F1;color:#3E4C7A}
  .billtotals{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px;padding-top:14px;border-top:1px dashed var(--line-strong)}
  .sumchip{font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--ink);background:var(--card);border:1px solid var(--line);padding:7px 13px;border-radius:99px}
  .sumchip em{color:var(--faint);font-style:normal;margin-right:6px;font-size:11px;text-transform:uppercase;letter-spacing:.06em}
  .sumchip b{font-weight:600}
  .sumchip.paid{color:var(--good)}

  /* credit cards */
  .cardgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px}
  .card-tile{
    --c:#3A3733;cursor:pointer;text-align:left;color:#fff;border-radius:18px;padding:20px;
    background:linear-gradient(140deg, var(--c), color-mix(in srgb, var(--c) 62%, #000));
    box-shadow:0 10px 28px color-mix(in srgb, var(--c) 28%, transparent);
    display:flex;flex-direction:column;gap:14px;min-height:172px;position:relative;overflow:hidden;
    border:none;transition:transform .16s ease, box-shadow .16s ease;
  }
  .card-tile::after{content:"";position:absolute;width:160px;height:160px;border-radius:50%;right:-50px;top:-60px;background:rgba(255,255,255,.08)}
  .card-tile:hover{transform:translateY(-3px);box-shadow:0 16px 38px color-mix(in srgb, var(--c) 38%, transparent)}
  .ct-top{display:flex;align-items:center;justify-content:space-between;gap:10px;position:relative;z-index:1}
  .ct-bank{font-family:'Fraunces',serif;font-size:18px;font-weight:500}
  .ct-menu{width:28px;height:28px;border-radius:8px;color:rgba(255,255,255,.75);display:flex;align-items:center;justify-content:center;transition:background .15s ease}
  .ct-menu:hover{background:rgba(255,255,255,.15);color:#fff}
  .ct-num{font-family:'JetBrains Mono',monospace;font-size:15px;letter-spacing:.14em;color:rgba(255,255,255,.92);position:relative;z-index:1}
  .ct-bar{height:6px;border-radius:99px;background:rgba(255,255,255,.22);overflow:hidden;position:relative;z-index:1}
  .ct-bar i{display:block;height:100%;background:rgba(255,255,255,.9);border-radius:99px}
  .ct-row{display:flex;justify-content:space-between;gap:10px;font-size:12.5px;color:rgba(255,255,255,.85);position:relative;z-index:1}
  .ct-row b{font-weight:600;color:#fff}
  .ct-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:auto;position:relative;z-index:1;flex-wrap:wrap}
  .ct-due{font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(255,255,255,.8)}
  .ct-paid{font-size:11.5px;font-weight:600;color:#fff;background:rgba(255,255,255,.18);padding:6px 11px;border-radius:99px;transition:background .15s ease;white-space:nowrap}
  .ct-paid:hover{background:rgba(255,255,255,.3)}
  .ct-paid.on{background:rgba(255,255,255,.92);color:var(--c)}
  @media(max-width:520px){.two{grid-template-columns:1fr}.cardgrid{grid-template-columns:1fr}}

  /* card detail */
  .cd-hero{
    --c:#3A3733;color:#fff;border-radius:20px;padding:24px;margin-top:6px;
    background:linear-gradient(140deg, var(--c), color-mix(in srgb, var(--c) 60%, #000));
    box-shadow:0 14px 34px color-mix(in srgb, var(--c) 30%, transparent);
    display:flex;flex-direction:column;gap:16px;position:relative;overflow:hidden;
  }
  .cd-hero::after{content:"";position:absolute;width:220px;height:220px;border-radius:50%;right:-70px;top:-90px;background:rgba(255,255,255,.08)}
  .cd-hero .ct-bank{font-size:22px}
  .cd-hero .ct-num{font-size:17px}
  .cd-edit{width:36px;height:36px;border-radius:10px;color:rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.14);transition:background .15s ease;position:relative;z-index:1}
  .cd-edit:hover{background:rgba(255,255,255,.28);color:#fff}
  .cd-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:16px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
  .stat .snum{font-family:'Fraunces',serif;font-size:24px;font-weight:500;line-height:1}
  .stat .slbl{font-size:12px;color:var(--muted);margin-top:6px}

  .instlist{display:flex;flex-direction:column;gap:10px}
  .inst{display:flex;align-items:stretch;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 16px 16px 18px}
  .inst.done{border-style:dashed;background:transparent}
  .inst-main{flex:1;min-width:0}
  .inst-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .inst-title{font-size:15px;font-weight:600}
  .inst.done .inst-title{color:var(--faint)}
  .inst-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:5px}
  .imono{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--muted)}
  .imono.next{color:var(--accent);font-weight:600}
  .idot{color:var(--faint)}
  .inst-bar{height:7px;border-radius:99px;background:var(--paper-2);overflow:hidden;margin-top:12px}
  .inst-bar i{display:block;height:100%;background:var(--accent);border-radius:99px;transition:width .4s ease}
  .inst-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:9px}
  .iprog{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink);font-weight:500}
  .inst.done .iprog{color:var(--good)}
  .iremain{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted)}
  .inst-actions{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
  .istep{border:1px solid var(--line-strong);background:var(--card);border-radius:10px;padding:9px 14px;font-size:13px;font-weight:600;color:var(--ink);transition:all .15s ease;white-space:nowrap}
  .istep:hover{border-color:var(--accent);color:var(--accent)}
  .istep.pay{background:var(--accent);color:#fff;border-color:var(--accent)}
  .istep.pay:hover{filter:brightness(1.08);color:#fff}

  /* dashboard — yaklaşanlar */
  .due-group{margin-top:24px}
  .due-glabel{font-size:11px;letter-spacing:.14em;color:var(--faint);margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .due-gcount{font-family:'JetBrains Mono',monospace;background:var(--paper-2);color:var(--muted);padding:1px 7px;border-radius:99px;font-size:10.5px;letter-spacing:0}
  .duelist{display:flex;flex-direction:column;gap:8px}
  .due{
    width:100%;text-align:left;display:flex;align-items:center;gap:14px;
    background:var(--card);border:1px solid var(--line);border-radius:13px;padding:12px 14px 12px 12px;
    transition:transform .14s ease,border-color .14s ease;
  }
  .due:hover{transform:translateX(2px);border-color:var(--line-strong)}
  .due-date{
    width:48px;height:48px;flex:none;border-radius:11px;background:var(--paper-2);
    display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1;
  }
  .due-date.overdue{background:#F6E6E3}
  .due-date.soon{background:#F3EBDD}
  .dd-day{font-family:'Fraunces',serif;font-size:19px;font-weight:600;color:var(--ink)}
  .due-date.overdue .dd-day{color:#A4453B}
  .dd-mon{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;margin-top:1px}
  .due-body{flex:1;min-width:0}
  .due-title{font-size:14.5px;font-weight:500;line-height:1.3}
  .due-sub{display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap}
  .due-tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px}
  .due-when{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
  .due.overdue .due-when{color:#A4453B;font-weight:600}
  .due.soon .due-when{color:var(--accent);font-weight:600}
  .due-amt{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;white-space:nowrap}
  .due-amt.neg{color:#A4453B}
  .due-amt.pos{color:#5C7A52}

  /* ---------- MODAL ---------- */
  .overlay{
    position:fixed;inset:0;background:rgba(28,26,23,.34);backdrop-filter:blur(3px);
    display:flex;align-items:center;justify-content:center;padding:20px;z-index:50;
    opacity:0;pointer-events:none;transition:opacity .2s ease;
  }
  .overlay.show{opacity:1;pointer-events:auto}
  .modal{
    background:var(--paper);border-radius:20px;width:100%;max-width:460px;
    box-shadow:0 20px 60px rgba(28,26,23,.28);
    transform:translateY(12px);transition:transform .2s ease;
    max-height:90vh;overflow:auto;
  }
  .overlay.show .modal{transform:none}
  .modal-head{padding:24px 26px 0}
  .modal-head h3{font-family:'Fraunces',serif;font-weight:500;font-size:22px;margin:6px 0 0}
  .modal-body{padding:18px 26px 26px;display:flex;flex-direction:column;gap:16px}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:7px;letter-spacing:.02em}
  .field input, .field textarea, .field select{
    width:100%;border:1px solid var(--line-strong);border-radius:11px;
    background:var(--card);padding:12px 14px;font-family:inherit;font-size:14.5px;color:var(--ink);
    transition:border-color .15s ease;resize:vertical;
  }
  .field input:focus, .field textarea:focus, .field select:focus{border-color:var(--accent);outline:none}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .seg{display:flex;gap:6px}
  .seg button{
    flex:1;padding:11px;border-radius:10px;border:1px solid var(--line-strong);
    background:var(--card);font-size:13px;font-weight:500;color:var(--muted);transition:all .15s ease;
  }
  .seg button.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .swatches{display:flex;gap:9px;flex-wrap:wrap}
  .swatch{width:34px;height:34px;border-radius:9px;border:2px solid transparent;transition:transform .12s ease}
  .swatch:hover{transform:scale(1.08)}
  .swatch.on{border-color:var(--ink);box-shadow:0 0 0 2px var(--paper) inset}
  .logo-pick{display:flex;align-items:center;gap:14px}
  .logo-pick .prev{width:54px;height:54px;border-radius:13px;background:var(--paper-2);display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid var(--line)}
  .logo-pick .prev img{width:100%;height:100%;object-fit:cover}
  .ghost-btn{padding:9px 14px;border:1px solid var(--line-strong);border-radius:10px;font-size:13px;font-weight:500;color:var(--ink);background:var(--card);transition:all .15s ease}
  .ghost-btn:hover{background:var(--paper-2)}
  .modal-foot{display:flex;gap:10px;justify-content:flex-end;padding-top:4px}
  .btn{padding:12px 20px;border-radius:11px;font-size:14px;font-weight:600;transition:all .15s ease}
  .btn.primary{background:var(--ink);color:var(--paper)}
  .btn.primary:hover{background:#000}
  .btn.subtle{color:var(--muted)}
  .btn.subtle:hover{background:var(--paper-2);color:var(--ink)}
  .btn.danger{color:#A4453B}
  .btn.danger:hover{background:#F6E6E3}

  /* action menu (small popover) */
  .popover{
    position:fixed;z-index:60;background:var(--card);border:1px solid var(--line-strong);
    border-radius:12px;box-shadow:0 12px 36px rgba(28,26,23,.18);padding:6px;min-width:160px;
    opacity:0;pointer-events:none;transform:translateY(-4px);transition:all .14s ease;
  }
  .popover.show{opacity:1;pointer-events:auto;transform:none}
  .popover button{
    width:100%;text-align:left;padding:10px 12px;border-radius:8px;font-size:13.5px;color:var(--ink);
    display:flex;align-items:center;gap:10px;transition:background .12s ease;
  }
  .popover button:hover{background:var(--paper-2)}
  .popover button.del{color:#A4453B}
  .popover button.del:hover{background:#F6E6E3}
  .popover .sep{height:1px;background:var(--line);margin:5px 4px}

  /* footer */
  .foot{margin-top:46px;padding-top:22px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap}
  .foot .links{display:flex;gap:8px}
  .foot button{font-size:12.5px;color:var(--muted);padding:7px 11px;border-radius:8px;transition:all .15s ease;font-weight:500}
  .foot button:hover{background:var(--paper-2);color:var(--ink)}
  .foot .sig{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--faint);letter-spacing:.04em}

  .toast{
    position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:var(--paper);padding:12px 20px;border-radius:12px;
    font-size:13.5px;font-weight:500;box-shadow:0 12px 30px rgba(0,0,0,.25);
    opacity:0;pointer-events:none;transition:all .25s ease;z-index:80;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .hidden{display:none !important}
  @media(max-width:760px){
    .wrap{padding:24px 18px 70px}
  }
  @media(max-width:640px){
    .wrap{padding:18px 14px 64px}
    .home-sec,.entry-panel{margin-top:26px}
    .masthead{margin-bottom:22px;padding-bottom:16px}
    .brief-stat{border-left:none;padding-left:0;text-align:left}
    .brief-stat .lbl{margin-left:0}
    .cd-hero{padding:18px}
    .cv-head .logo{width:48px;height:48px}
    .modal{max-width:none}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none !important;animation:none !important}}

  /* ---------- KİLİT EKRANI ---------- */
  .lockscreen{
    position:fixed;inset:0;z-index:200;background:var(--paper);
    display:flex;align-items:center;justify-content:center;padding:24px;
    opacity:0;pointer-events:none;transition:opacity .25s ease;
  }
  .lockscreen.show{opacity:1;pointer-events:auto}
  .lock-card{width:100%;max-width:330px;display:flex;flex-direction:column;align-items:center;text-align:center}
  .lock-ico{width:62px;height:62px;border-radius:18px;background:var(--ink);color:var(--paper);display:flex;align-items:center;justify-content:center;margin-bottom:16px}
  .lock-title{font-family:'Fraunces',serif;font-size:26px;font-weight:500;letter-spacing:-.01em}
  .lock-sub{font-size:13.5px;color:var(--muted);margin-top:4px}
  .pin-dots{display:flex;gap:16px;margin:24px 0 26px}
  .pin-dots span{width:14px;height:14px;border-radius:50%;border:2px solid var(--line-strong);transition:all .15s ease}
  .pin-dots span.on{background:var(--ink);border-color:var(--ink)}
  .pin-dots.err span{border-color:#A4453B;background:transparent}
  .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:100%;max-width:300px}
  .pad button{height:66px;border-radius:16px;border:1px solid var(--line);background:var(--card);font-family:'Fraunces',serif;font-size:25px;font-weight:500;color:var(--ink);transition:transform .1s ease, background .12s ease;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none}
  .pad button:hover{background:var(--paper-2)}
  .pad button:active{transform:scale(.95);background:var(--paper-2)}
  .pad .pad-ghost{visibility:hidden;border:none;background:none}
  .pad .pad-fn{font-family:'Inter',sans-serif;font-size:22px;color:var(--muted)}
  @keyframes lockshake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-9px)}40%,80%{transform:translateX(9px)}}
  .lock-card.shake{animation:lockshake .36s}
  .rem-me-btn{margin-top:18px;padding:9px 20px;border-radius:10px;border:1.5px solid var(--line);background:var(--card);font-size:13px;font-weight:500;color:var(--muted);transition:all .15s;width:100%}
  .rem-me-btn.on{background:#EDE8F5;border-color:#C4B5D9;color:#7C5C9F;font-weight:600}
  .lock-touch-wrap{display:none;flex-direction:column;align-items:center;gap:8px;margin-top:22px}
  .lock-touch-wrap.visible{display:flex}
  .lock-touch-btn{width:58px;height:58px;border-radius:50%;border:1.5px solid var(--line);background:var(--card);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s ease}
  .lock-touch-btn:hover{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .lock-touch-lbl{font-size:12px;color:var(--muted)}
  .wa-help{font-size:12.5px;line-height:1.5;color:var(--muted);background:var(--paper-2);border-radius:11px;padding:12px 14px}
  .wa-help b{color:var(--ink);font-weight:600}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<input type="file" id="logoInput" accept="image/*" class="hidden" />
<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<div class="popover" id="popover"></div>
<div class="toast" id="toast"></div>
<div class="lockscreen" id="lockscreen">
  <div class="lock-card" id="lockCard">
    <div class="lock-ico"><svg width="30" height="30" viewBox="0 0 24 24" fill="none"><rect x="4" y="10.5" width="16" height="11" rx="2.5" stroke="currentColor" stroke-width="1.8"/><path d="M7.5 10.5V7.5a4.5 4.5 0 019 0v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="12" cy="16" r="1.4" fill="currentColor"/></svg></div>
    <div class="lock-title">Kilitli</div>
    <div class="lock-sub">Devam etmek için şifreyi gir</div>
    <div class="pin-dots" id="pinDots"><span></span><span></span><span></span><span></span></div>
    <div class="pad" id="pinPad" style="touch-action:manipulation">
      <button data-d="1">1</button><button data-d="2">2</button><button data-d="3">3</button>
      <button data-d="4">4</button><button data-d="5">5</button><button data-d="6">6</button>
      <button data-d="7">7</button><button data-d="8">8</button><button data-d="9">9</button>
      <button class="pad-ghost"></button><button data-d="0">0</button><button class="pad-fn" data-back>⌫</button>
    </div>
    <button class="rem-me-btn" id="remMeBtn">📱 Beni hatırla (7 gün)</button>
    <div class="lock-touch-wrap" id="touchWrap">
      <button class="lock-touch-btn" id="touchBtn" aria-label="Touch ID ile aç">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <path d="M17 8.5C17 5.46 14.54 3 11.5 3S6 5.46 6 8.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          <path d="M3 10.5C3 14.09 4.5 17.3 6.93 19.57" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          <path d="M9 8.5c0-1.38 1.12-2.5 2.5-2.5S14 7.12 14 8.5V13" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          <path d="M11.5 11v5.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          <path d="M14 16.5c0 1.38-1.12 2.5-2.5 2.5-1.04 0-1.94-.64-2.33-1.55" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          <path d="M20 8.5c0 3.79-1.97 7.11-4.94 9.02" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          <path d="M17 13c0 1.62-.53 3.12-1.42 4.33" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
      </button>
      <span class="lock-touch-lbl">Touch ID ile aç</span>
    </div>
  </div>
</div>

<script>
/* ============================================================
   RUTİN KOMUTA MERKEZİ — tek dosya, IndexedDB ile kalıcı
   ============================================================ */

const PALETTE = [
  {name:'Toz Pembe', accent:'#BD7A8E', tint:'#F3E7EA'},
  {name:'Bronz',     accent:'#B07B3E', tint:'#F1E7D6'},
  {name:'Mürekkep',  accent:'#4B5B6B', tint:'#E3E8EC'},
  {name:'Adaçayı',   accent:'#6E8567', tint:'#E6ECE2'},

let db;
function openDB(){
  return new Promise((res,rej)=>{
    const r = indexedDB.open('rutinMerkezi', 9);
    r.onupgradeneeded = e=>{
      const d = e.target.result;
      if(!d.objectStoreNames.contains('companies')) d.createObjectStore('companies',{keyPath:'id'});
      if(!d.objectStoreNames.contains('routines'))  d.createObjectStore('routines',{keyPath:'id'});
      if(!d.objectStoreNames.contains('completions')) d.createObjectStore('completions',{keyPath:'id'});
      if(!d.objectStoreNames.contains('notes')) d.createObjectStore('notes',{keyPath:'id'});
      if(!d.objectStoreNames.contains('bills')) d.createObjectStore('bills',{keyPath:'id'});
      if(!d.objectStoreNames.contains('cards')) d.createObjectStore('cards',{keyPath:'id'});
      if(!d.objectStoreNames.contains('payments')) d.createObjectStore('payments',{keyPath:'id'});
      if(!d.objectStoreNames.contains('installments')) d.createObjectStore('installments',{keyPath:'id'});
      if(!d.objectStoreNames.contains('cheques')) d.createObjectStore('cheques',{keyPath:'id'});
      if(!d.objectStoreNames.contains('settings')) d.createObjectStore('settings',{keyPath:'id'});
      if(!d.objectStoreNames.contains('banks')) d.createObjectStore('banks',{keyPath:'id'});
      if(!d.objectStoreNames.contains('bankAccounts')) d.createObjectStore('bankAccounts',{keyPath:'id'});
      if(!d.objectStoreNames.contains('loans')) d.createObjectStore('loans',{keyPath:'id'});
      if(!d.objectStoreNames.contains('customReminders')) d.createObjectStore('customReminders',{keyPath:'id'});
    };
    r.onsuccess = e=>{db=e.target.result;res()};
    r.onerror = e=>rej(e);
  });
}
function tx(store, mode='readonly'){return db.transaction(store,mode).objectStore(store)}
function getAll(store){return new Promise(r=>{const q=tx(store).getAll();q.onsuccess=()=>r(q.result||[])})}
function put(store,val){return new Promise(r=>{const q=tx(store,'readwrite').put(val);q.onsuccess=()=>{afterWrite(store);r()}})}
function del(store,key){return new Promise(r=>{const q=tx(store,'readwrite').delete(key);q.onsuccess=()=>{afterWrite(store);r()}})}
function clearStore(store){return new Promise(r=>{const q=tx(store,'readwrite').clear();q.onsuccess=()=>{afterWrite(store);r()}})}
function getOne(store,key){return new Promise(res=>{try{const q=tx(store).get(key);q.onsuccess=()=>res(q.result||null);q.onerror=()=>res(null)}catch(e){res(null)}})}

const SYNC_STORES=['companies','routines','completions','notes','bills','cards','payments','installments','cheques','banks','bankAccounts','loans','customReminders'];
let suppressPush=false;
function afterWrite(store){
  if(suppressPush)return;
  if(typeof cloudReady!=='undefined' && cloudReady && SYNC_STORES.includes(store)) schedulePush();
}

/* ---------- Dönem anahtarları (otomatik sıfırlama mantığı) ---------- */
function dailyKey(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function monthlyKey(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`}
function isoWeek(d){
  const date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const dayNum=(date.getUTCDay()+6)%7;
  date.setUTCDate(date.getUTCDate()-dayNum+3);
  const firstThursday=new Date(Date.UTC(date.getUTCFullYear(),0,4));
  const week=1+Math.round(((date-firstThursday)/86400000-3+((firstThursday.getUTCDay()+6)%7))/7);
  return {year:date.getUTCFullYear(),week};
}
function weeklyKey(d){const w=isoWeek(d);return `${w.year}-W${String(w.week).padStart(2,'0')}`}
function periodKeyFor(freq,d=new Date()){
  if(freq==='daily')return dailyKey(d);
  if(freq==='weekly')return weeklyKey(d);
  return monthlyKey(d);
}

function compRoutines(cid,freq){

function isDone(routine, d=new Date()){
  return !!completions[`${routine.id}__${periodKeyFor(routine.freq,d)}`];
}
function freqProgress(cid,freq,d=new Date()){
  const list=compRoutines(cid,freq);
  const done=list.filter(r=>isDone(r,d)).length;
  return {done,total:list.length};
}

// Pastelya rutinlerini bir kez ekler; kullanıcı sonradan silerse geri gelmez.
async function seedPastelyaRoutines(){
  let comp=companies.find(c=>/pastelya/i.test(c.name||''));
  if(!comp)comp=companies.find(c=>c.type==='E-Ticaret');
  if(!comp||comp._pastelyaSeeded)return;
  const existing=new Set(routines.filter(r=>r.companyId===comp.id).map(r=>r.freq+'|'+(r.title||'').trim()));
  for(const freq of ['daily','weekly','monthly']){
    let order=routines.filter(r=>r.companyId===comp.id && r.freq===freq).length;
    for(const title of PASTELYA_ROUTINES[freq]){
      if(existing.has(freq+'|'+title.trim()))continue;
      await put('routines',{id:uid(),companyId:comp.id,freq,title,note:'',order:order++,createdAt:Date.now()});
    }
  }
  comp._pastelyaSeeded=true;
  await put('companies',comp);
}

}

async function toggleRoutine(routine){

  const id=`${routine.id}__${pk}`;

  else { const rec={id,routineId:routine.id,freq:routine.freq,periodKey:pk,completedAt:Date.now()}; completions[id]=rec; await put('completions',rec); }
  render();
}

/* ---------- Yaklaşan ödemeler panosu ---------- */
function upcomingItems(){
  const today=new Date();today.setHours(0,0,0,0);
  const y=today.getFullYear(), m=today.getMonth();
  const diffDays=d=>Math.round((d-today)/86400000);
  const items=[];

  // Faturalar (bu ay, ödenmemiş — Şahsi hariç)
  bills.forEach(b=>{
    if(isPaid(b.id))return;
    const bc=companies.find(x=>x.id===b.company);
    if(bc&&bc.isPersonal)return; // Şahsi faturalar yaklaşanlarda çıkmaz
    let date=null,days=null;
    if(b.dueDay){date=new Date(y,m,b.dueDay);days=diffDays(date)}
    items.push({key:'bill:'+b.id,date,days,title:b.name,sub:'Fatura',kind:'bill',dir:null,amount:null,currency:null,accent:'#5C7A52',go:()=>{
      const bc=companies.find(x=>x.id===b.company);
      if(bc&&bc.isPersonal){view={page:'personal',companyId:null,section:null,cardId:null,bankId:null,homeTab:'dashboard'}}
      else if(bc){view={page:'company',companyId:bc.id,section:'bills',cardId:null,bankId:null,homeTab:'dashboard'}}
      else{view={page:'home',companyId:null,section:null,cardId:null,bankId:null,homeTab:'dashboard'}}
      render();
    }});
  });

  // Kredi kartı ekstresi (bu ay, ödenmemiş)
  cards.forEach(cd=>{
    if(isPaid(cd.id))return;
    if(!cd.dueDay)return;
    const date=new Date(y,m,cd.dueDay);const days=diffDays(date);
    items.push({key:'card:'+cd.id,date,days,title:`${cd.bank} ekstresi`,sub:'Kredi kartı',kind:'card',dir:'out',amount:Number(cd.debt||0)||null,currency:cd.currency||'TRY',accent:'#3E4C7A',go:()=>{view={page:'card',companyId:null,section:null,cardId:cd.id,homeTab:'dashboard'};render()}});
  });

  // Krediler (aktif, bu ayki taksit)
  loans.forEach(l=>{
    const months=Number(l.months||0), paid=Number(l.paidCount||0);
    if(paid>=months)return;
    if(!l.dueDay)return;
    const date=new Date(y,m,l.dueDay);const days=diffDays(date);
    items.push({key:'loan:'+l.id,date,days,title:`${l.title} taksiti`,sub:'Kredi',kind:'loan',dir:'out',amount:Number(l.monthly||0)||null,currency:l.currency||'TRY',accent:'#2F6E57',go:()=>{view={page:'loans',companyId:null,section:null,cardId:null,homeTab:'dashboard'};render()}});
  });

  // Çekler (kapanmamış)
  cheques.forEach(c=>{
    if(c.done)return;
    let date=null,days=null;
    if(c.dueDate){date=new Date(c.dueDate+'T00:00:00');date.setHours(0,0,0,0);days=diffDays(date)}
    const out=c.type==='verilen';
    items.push({key:'cheque:'+c.id,date,days,title:c.title,sub:out?'Çek · ödenecek':'Çek · tahsil',kind:'cheque',dir:out?'out':'in',amount:Number(c.amount||0),currency:c.currency||'TRY',accent:'#A45D4E',go:()=>{view={page:'cheques',companyId:null,section:null,cardId:null,homeTab:'dashboard'};render()}});
  });

  // sıralama: tarihliler önce (gün artışı), tarihsizler sona
  items.sort((a,b)=>{
    if(a.days===null&&b.days===null)return 0;
    if(a.days===null)return 1;
    if(b.days===null)return -1;
    return a.days-b.days;
  });
  return items;
}

function dashboardHTML(){
  const items=upcomingItems();
  const sumOut7=items.filter(i=>i.dir==='out'&&i.days!==null&&i.days<=7&&(i.currency==='TRY'||!i.currency)).reduce((s,i)=>s+(i.amount||0),0);
  const sumIn=items.filter(i=>i.dir==='in'&&(i.currency==='TRY'||!i.currency)).reduce((s,i)=>s+(i.amount||0),0);
  const overdue=items.filter(i=>i.days!==null&&i.days<0).length;
  const billsPending=bills.filter(b=>!isPaid(b.id)).length;

  const stats=`
  <div class="cd-stats" style="margin-top:8px">
    <div class="stat"><div class="snum" style="color:${overdue?'#A4453B':'var(--ink)'}">${overdue}</div><div class="slbl">geciken ödeme</div></div>
    <div class="stat"><div class="snum">${fmtMoney(sumOut7,'TRY')}</div><div class="slbl">bu hafta ödenecek (₺)</div></div>
    <div class="stat"><div class="snum">${billsPending}</div><div class="slbl">bekleyen fatura</div></div>
    <div class="stat"><div class="snum" style="color:${sumIn?'#4f6b46':'var(--ink)'}">${fmtMoney(sumIn,'TRY')}</div><div class="slbl">tahsil bekleyen (₺)</div></div>
  </div>`;

  if(!items.length){
    return stats+`<div class="empty" style="margin-top:24px"><div class="ico">✓</div><div style="font-weight:500;color:var(--ink)">Yaklaşan ödeme yok</div><div style="font-size:13px;margin-top:4px">Bekleyen fatura, kart ekstresi veya çek bulunmuyor.</div></div>`;
  }

  const groups=[
    {key:'over',label:'Gecikenler',test:i=>i.days!==null&&i.days<0},
    {key:'week',label:'Bu hafta',test:i=>i.days!==null&&i.days>=0&&i.days<=7},
    {key:'month',label:'Bu ay',test:i=>i.days!==null&&i.days>7&&i.days<=31},
    {key:'later',label:'Daha sonra',test:i=>i.days!==null&&i.days>31},
    {key:'none',label:'Tarihi belirsiz',test:i=>i.days===null},
  ];
  let html=stats;
  groups.forEach(g=>{
    const list=items.filter(g.test);
    if(!list.length)return;
    html+=`<div class="due-group"><div class="due-glabel eyebrow">${g.label} <span class="due-gcount">${list.length}</span></div>
      <div class="duelist">${list.map((it,idx)=>dueRow(it,g.key+idx)).join('')}</div></div>`;
  });
  return html;
}

const _dueRefs=[];
function dueRow(it,id){
  _dueRefs[id]=it.go;
  let dPill,dClass='';
  if(it.date){
    dPill=`<span class="dd-day">${it.date.getDate()}</span><span class="dd-mon">${it.date.toLocaleDateString('tr-TR',{month:'short'}).replace('.','')}</span>`;
  }else{dPill=`<span class="dd-day">—</span>`}
  let daysText='';
  if(it.days===null)daysText='tarih yok';
  else if(it.days<0){daysText=`${-it.days} gün gecikti`;dClass='overdue'}
  else if(it.days===0)daysText='bugün';
  else if(it.days===1)daysText='yarın';
  else {daysText=`${it.days} gün sonra`;if(it.days<=5)dClass='soon'}
  const amt = it.amount!=null ? `<div class="due-amt ${it.dir==='out'?'neg':it.dir==='in'?'pos':''}">${it.dir==='out'?'−':it.dir==='in'?'+':''}${fmtMoney(it.amount,it.currency||'TRY')}</div>` : '';
  const tag=`<span class="due-tag" style="background:${it.accent}1f;color:${it.accent}">${it.sub}</span>`;
  return `<button class="due ${dClass}" data-go="${id}">
    <div class="due-date ${dClass}">${dPill}</div>
    <div class="due-body">
      <div class="due-title">${esc(it.title)}</div>
      <div class="due-sub">${tag}<span class="due-when">${daysText}</span></div>
    </div>
    ${amt}
  </button>`;
}

function bindDashboard(){
  document.querySelectorAll('[data-go]').forEach(b=>b.addEventListener('click',()=>{const fn=_dueRefs[b.dataset.go];if(fn)fn()}));
}

function billRow(b,d=new Date()){
  const todayDay=new Date().getDate();
  const isCurrentMonth=monthlyKey(d)===monthlyKey(new Date());
  const paid=isPaid(b.id,d);
  let status,scls;
  if(paid){status='Ödendi';scls='paid'}
  else if(!b.dueDay){status='';scls=''}
  else if(!isCurrentMonth){status=`ayın ${b.dueDay}'i`;scls=''}
  else if(b.dueDay<todayDay){status=`${todayDay-b.dueDay} gün gecikti`;scls='overdue'}
  else if(b.dueDay===todayDay){status='Bugün son gün';scls='soon'}
  else{const left=b.dueDay-todayDay;status=`${left} gün kaldı`;scls=left<=3?'soon':''}
  return `<div class="bill ${paid?'paid':''}">
    <button class="bcheck" data-bpay="${b.id}" aria-label="Ödendi işaretle">${svgCheck()}</button>
    <div class="bbody" data-bedit="${b.id}">
      <div class="bname">${esc(b.name)}</div>
      <div class="bmeta">
        ${b.dueDay?`<span class="bday">ayın ${b.dueDay}'i</span>`:''}${status?`<span class="bstat ${scls}">${status}</span>`:''}
      </div>
    </div>
    <button class="rmenu-btn" data-bmenu="${b.id}" aria-label="Seçenekler">${svgDots()}</button>
  </div>`;
}

function nextDueDate(day){

  let d=new Date(t.getFullYear(),t.getMonth(),day);

  return d;
}

  if(r.freq==='monthly') return `Her ayın ${r.monthDay||'?'}'i`;
  if(r.freq==='once') return r.onceDate||'Tarih belirsiz';

function openRemMenu(id,anchor){
  const r=customReminders.find(x=>x.id===id);if(!r)return;
  popover.innerHTML=`<button data-edit>${svgGear()} Düzenle</button><div class="sep"></div><button class="del" data-del>🗑 Sil</button>`;
  placePopover(anchor);popover.classList.add('show');
  popover.querySelector('[data-edit]').onclick=()=>{closePopover();openCustomRemModal(r)};
  popover.querySelector('[data-del]').onclick=async()=>{closePopover();await del('customReminders',r.id);customReminders=customReminders.filter(x=>x.id!==r.id);render();toast('Silindi');if(cloudReady)cloudPushAll();};
}

function openCustomRemModal(rem){
  const editing=!!rem;
  let freq=rem?.freq||'daily';
  let weekDays=rem?.weekDays?[...rem.weekDays]:[1];
  let en=rem?.enabled!==false;

  function updateVisible(){
    const ww=document.getElementById('rmWeekWrap');
    const mw=document.getElementById('rmMonthWrap');
    const ow=document.getElementById('rmOnceDateWrap');
    if(ww) ww.style.display=freq==='weekly'?'':'none';
    if(mw) mw.style.display=freq==='monthly'?'':'none';
    if(ow) ow.style.display=freq==='once'?'':'none';
  }

  modal.innerHTML=`
    <div class="modal-head"><div class="eyebrow">${editing?'Düzenle':'Yeni hatırlatıcı'}</div><h3>${editing?'Hatırlatıcıyı düzenle':'Hatırlatıcı ekle'}</h3></div>
    <div class="modal-body">
      <div class="field"><label>Konu</label>
        <input type="text" id="rmTitle" placeholder="Örn. SGK ödemesi, toplantı..." value="${editing?esc(rem.title):''}"></div>
      <div class="field"><label>Saat (Türkiye saati)</label>
        <input type="time" id="rmTime" value="${editing?(rem.time||'09:00'):'09:00'}"></div>
      <div class="field"><label>Sıklık</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px" id="rmFreq">
          <button data-f="daily" class="btn subtle${freq==='daily'?' on':''}">📅 Günlük</button>
          <button data-f="weekly" class="btn subtle${freq==='weekly'?' on':''}">📆 Haftalık</button>
          <button data-f="monthly" class="btn subtle${freq==='monthly'?' on':''}">🗓 Aylık</button>
          <button data-f="once" class="btn subtle${freq==='once'?' on':''}">📌 Tek seferlik</button>
        </div>
      </div>
      <div id="rmWeekWrap" class="field" style="display:${freq==='weekly'?'':'none'}"><label>Gün(ler)</label>
        <div style="display:flex;gap:6px;flex-wrap:wrap">${REM_DAYS.map((d,i)=>`<button class="wday-btn${weekDays.includes(i)?' on':''}" data-wd="${i}">${d}</button>`).join('')}</div>
      </div>
      <div id="rmMonthWrap" class="field" style="display:${freq==='monthly'?'':'none'}"><label>Ayın kaçı</label>
        <input type="number" id="rmMonthDay" inputmode="numeric" min="1" max="31" placeholder="Örn. 15" value="${editing&&rem.monthDay?rem.monthDay:''}"></div>
      <div id="rmOnceDateWrap" class="field" style="display:${freq==='once'?'':'none'}"><label>Tarih</label>
        <input type="date" id="rmOnceDate" value="${editing&&rem.onceDate?rem.onceDate:''}"></div>
      <div class="field"><label>Durum</label>
        <div class="seg" id="rmEn"><button data-v="1" class="${en?'on':''}">Açık</button><button data-v="0" class="${!en?'on':''}">Kapalı</button></div></div>
      <div class="modal-foot">
        ${editing?'<button class="btn danger" id="rmDel">Sil</button>':''}
        <button class="btn subtle" id="rmCancel">Vazgeç</button>
        <button class="btn primary" id="rmSave">${editing?'Kaydet':'Ekle'}</button>
      </div>
    </div>`;
  overlay.classList.add('show');
  setTimeout(()=>$('#rmTitle')&&$('#rmTitle').focus(),60);

  modal.querySelectorAll('#rmFreq button').forEach(b=>b.onclick=()=>{
    freq=b.dataset.f;
    modal.querySelectorAll('#rmFreq button').forEach(x=>x.classList.toggle('on',x===b));
    updateVisible();
  });
  modal.querySelectorAll('.wday-btn').forEach(b=>b.onclick=()=>{
    const wd=Number(b.dataset.wd);
    if(weekDays.includes(wd))weekDays=weekDays.filter(x=>x!==wd);
    else weekDays.push(wd);
    if(!weekDays.length)weekDays=[wd]; // en az 1
    modal.querySelectorAll('.wday-btn').forEach(x=>x.classList.toggle('on',weekDays.includes(Number(x.dataset.wd))));
  });
  modal.querySelectorAll('#rmEn button').forEach(b=>b.onclick=()=>{en=b.dataset.v==='1';modal.querySelectorAll('#rmEn button').forEach(x=>x.classList.toggle('on',x===b))});
  $('#rmCancel').onclick=closeModal;
  if(editing)$('#rmDel').onclick=async()=>{closePopover();await del('customReminders',rem.id);customReminders=customReminders.filter(x=>x.id!==rem.id);closeModal();render();toast('Silindi')};
  $('#rmSave').onclick=async()=>{
    const title=$('#rmTitle').value.trim();if(!title){$('#rmTitle').focus();return}
    const time=$('#rmTime').value||'09:00';
    const obj={
      id:editing?rem.id:uid(),
      title,time,freq,enabled:en,
      weekDays:freq==='weekly'?weekDays:[],
      monthDay:freq==='monthly'?(parseInt($('#rmMonthDay').value)||1):null,
      onceDate:freq==='once'?($('#rmOnceDate').value||''):'',
      createdAt:editing?(rem.createdAt||Date.now()):Date.now()
    };
    await put('customReminders',obj);
    if(!editing)customReminders.push(obj);
    else{const i=customReminders.findIndex(x=>x.id===obj.id);if(i>=0)customReminders[i]=obj;}
    closeModal();render();
    if(cloudReady) cloudPushAll();
    toast(editing?'Kaydedildi':`"${title}" eklendi`);
  };
}

function cardTile(cd){
  const cur=cd.currency||'TRY';
  const paid=isPaid(cd.id);
  const limit=Number(cd.limit||0), debt=Number(cd.debt||0);
  const avail=Math.max(0,limit-debt);
  const usePct=limit>0?Math.min(100,Math.round(debt/limit*100)):0;
  const dleft=daysUntil(nextDueDate(cd.dueDay||1));
  const inst=installments.filter(i=>i.cardId===cd.id);
  const activeInst=inst.filter(i=>(i.paidCount||0)<i.months);
  const monthlyBurden=activeInst.reduce((s,i)=>s+(Number(i.total||0)/i.months),0);
  return `<div class="card-tile" data-center="${cd.id}" style="--c:${cd.color||'#3A3733'}">
    <div class="ct-top">
      <span class="ct-bank">${esc(cd.bank)}</span>
      <button class="ct-menu" data-cmenu="${cd.id}" aria-label="Seçenekler">${svgDots()}</button>
    </div>
    <div class="ct-num">•••• •••• •••• ${esc(cd.last4||'••••')}</div>
    ${limit>0?`<div class="ct-bar"><i style="width:${usePct}%"></i></div>
    <div class="ct-row"><span>Borç <b>${fmtMoney(debt,cur)}</b></span><span>Kalan ${fmtMoney(avail,cur)}</span></div>`:'<div class="ct-row"><span>Limit girilmedi</span></div>'}
    ${activeInst.length?`<div class="ct-row"><span>${activeInst.length} aktif taksit</span><span>${fmtMoney(monthlyBurden,cur)}/ay</span></div>`:''}
    <div class="ct-foot">
      <span class="ct-due">Son ödeme: ayın ${cd.dueDay||'—'}'i${cd.dueDay?` · ${dleft} gün`:''}</span>
      <button class="ct-paid ${paid?'on':''}" data-cpay="${cd.id}">${paid?'✓ Bu ay ödendi':'Ödendi işaretle'}</button>
    </div>
  </div>`;
}

function loanRow(l){
  const cur=l.currency||'TRY';
  const months=Number(l.months||0), paid=Number(l.paidCount||0);
  const remain=Math.max(0,months-paid);
  const pct=months>0?Math.min(100,Math.round(paid/months*100)):0;
  const monthly=Number(l.monthly||0);
  const remainAmt=monthly*remain;
  const done=months>0&&paid>=months;
  const dleft=l.dueDay?daysUntil(nextDueDate(l.dueDay)):null;
  return `<div class="bill loan ${done?'paid':''}">
    <div class="bbody" data-ledit="${l.id}">
      <div class="bname">${esc(l.title)} <span class="qtag">${paid}/${months} taksit</span></div>
      <div class="secbar" style="margin:7px 0 6px"><i style="width:${pct}%"></i></div>
      <div class="bmeta">
        ${monthly?`<span class="bday">${fmtMoney(monthly,cur)}/ay</span>`:''}
        ${remain?`<span class="btag genel">kalan ${fmtMoney(remainAmt,cur)}</span>`:'<span class="bstat paid">bitti</span>'}
        ${l.dueDay&&remain?`<span class="bstat ${dleft!=null&&dleft<=5?'soon':''}">ayın ${l.dueDay}'i${dleft!=null?` · ${dleft} gün`:''}</span>`:''}
      </div>
    </div>
    <button class="ct-paid ${done?'on':''}" data-lpay="${l.id}">${done?'✓ bitti':'Taksit öde'}</button>
    <button class="rmenu-btn" data-lmenu="${l.id}" aria-label="Seçenekler">${svgDots()}</button>
  </div>`;
}

function renderLoansPage(){
  document.documentElement.style.setProperty('--accent','#2F6E57');
  const active=loans.filter(l=>(l.paidCount||0)<Number(l.months||0));
  const sums={};
  active.forEach(l=>{const c=l.currency||'TRY';const s=sums[c]=sums[c]||{monthly:0,remain:0};s.monthly+=Number(l.monthly||0);s.remain+=Number(l.monthly||0)*Math.max(0,Number(l.months||0)-(l.paidCount||0))});
  const chips=Object.entries(sums).map(([cur,s])=>`
    <span class="sumchip"><em>aylık</em> <b>${fmtMoney(s.monthly,cur)}</b></span>
    <span class="sumchip"><em>kalan</em> ${fmtMoney(s.remain,cur)}</span>`).join('');
  const rows= loans.length? loans.map(loanRow).join('') :
    `<div class="empty"><div class="ico">◌</div><div style="font-weight:500;color:var(--ink)">Henüz kredi yok</div><div style="font-size:13px;margin-top:4px">Banka kredilerini ekle; aylık taksidini, kalan tutarı ve ödeme gününü takip et.</div></div>`;
  app.innerHTML=`
  <div class="cv" style="--accent:#2F6E57;--accent-tint:#DCEBE2">
    <button class="backbtn" data-back>${svgBack()} Genel bakış</button>
    <div class="cv-head">
      <span class="logo" style="background:var(--accent-tint);color:var(--accent);width:56px;height:56px">${svgLoan()}</span>
      <div class="cv-title">
        <div class="eyebrow" style="color:var(--accent)">Taksit takibi</div>
        <h2>Kredilerim</h2>
      </div>
      <span class="spacer"></span>
      <button class="sec-add" data-addloan>${svgPlus()} Kredi ekle</button>
    </div>
    ${chips?`<div class="billtotals" style="border-top:none;padding-top:0;margin-top:0;margin-bottom:18px">${chips}</div>`:''}
    <div class="billlist">${rows}</div>
  </div>
  ${renderFooter()}
  `;
  $('[data-back]').addEventListener('click',()=>{view={page:'home',companyId:null,section:null,cardId:null,homeTab:view.homeTab||'overview'};render()});
  const al=$('[data-addloan]');if(al)al.addEventListener('click',()=>openLoanModal(null));
  document.querySelectorAll('[data-lpay]').forEach(b=>b.addEventListener('click',async e=>{e.stopPropagation();await payLoanInstallment(b.dataset.lpay);render()}));
  document.querySelectorAll('[data-ledit]').forEach(b=>b.addEventListener('click',()=>{const l=loans.find(x=>x.id===b.dataset.ledit);if(l)openLoanModal(l)}));
  document.querySelectorAll('[data-lmenu]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();openLoanMenu(b.dataset.lmenu,b)}));
  bindFooter();
}

async function payLoanInstallment(id){
  const l=loans.find(x=>x.id===id);if(!l)return;
  const months=Number(l.months||0);
  const paid=Number(l.paidCount||0);
  l.paidCount = paid>=months ? 0 : paid+1; // bitince geri sıfırla (yanlış basıldıysa)
  await put('loans',l);
  toast(l.paidCount>=months?'Kredi tamamlandı':`${l.paidCount}/${months} taksit ödendi`);
}

function openLoanMenu(id,anchor){
  const l=loans.find(x=>x.id===id);if(!l)return;
  popover.innerHTML=`<button data-edit>${svgGear()} Düzenle</button><div class="sep"></div><button class="del" data-del>🗑 Sil</button>`;
  placePopover(anchor);popover.classList.add('show');
  popover.querySelector('[data-edit]').onclick=()=>{closePopover();openLoanModal(l)};
  popover.querySelector('[data-del]').onclick=async()=>{closePopover();await del('loans',l.id);loans=loans.filter(x=>x.id!==l.id);render();toast('Kredi silindi')};

function openLoanModal(loan){
  const editing=!!loan;
  let cur=loan?(loan.currency||'TRY'):'TRY';
  modal.innerHTML=`
    <div class="modal-head"><div class="eyebrow">${editing?'Krediyi düzenle':'Yeni kredi'}</div><h3>${editing?'Düzenle':'Kredi ekle'}</h3></div>
    <div class="modal-body">
      <div class="field"><label>Kredi adı / banka</label>
        <input type="text" id="lTitle" placeholder="Örn. Garanti İhtiyaç Kredisi" value="${editing?esc(loan.title):''}"></div>
      <div class="two">
        <div class="field"><label>Aylık taksit</label><input type="number" id="lMonthly" inputmode="decimal" placeholder="0" value="${editing?loan.monthly:''}"></div>
        <div class="field"><label>Para birimi</label><div class="seg" id="lCur">${Object.keys(CURR).map(k=>`<button data-c="${k}" class="${k===cur?'on':''}">${k}</button>`).join('')}</div></div>
      </div>
      <div class="two">
        <div class="field"><label>Toplam taksit sayısı</label><input type="number" id="lMonths" inputmode="numeric" placeholder="Örn. 36" value="${editing?loan.months:''}"></div>
        <div class="field"><label>Ödenen taksit</label><input type="number" id="lPaid" inputmode="numeric" placeholder="0" value="${editing?(loan.paidCount||0):'0'}"></div>
      </div>
      <div class="field"><label>Ödeme günü (ayın kaçı)</label><input type="number" id="lDue" inputmode="numeric" min="1" max="31" placeholder="Örn. 15" value="${editing&&loan.dueDay?loan.dueDay:''}"></div>
      <div class="field"><label>Not (isteğe bağlı)</label><textarea id="lNote" rows="2">${editing?esc(loan.note||''):''}</textarea></div>
      <div class="modal-foot">
        ${editing?'<button class="btn danger" id="lDelete">Sil</button>':''}
        <button class="btn subtle" id="lCancel">Vazgeç</button>
        <button class="btn primary" id="lSave">${editing?'Kaydet':'Ekle'}</button>
      </div>
    </div>`;
  overlay.classList.add('show');setTimeout(()=>$('#lTitle').focus(),60);
  modal.querySelectorAll('#lCur button').forEach(b=>b.onclick=()=>{cur=b.dataset.c;modal.querySelectorAll('#lCur button').forEach(x=>x.classList.toggle('on',x===b))});
  $('#lCancel').onclick=closeModal;
  $('#lSave').onclick=async()=>{
    const title=$('#lTitle').value.trim();if(!title){$('#lTitle').focus();return}
    const monthly=parseFloat($('#lMonthly').value)||0;
    const months=parseInt($('#lMonths').value)||0;
    let paidCount=parseInt($('#lPaid').value)||0;
    if(paidCount<0)paidCount=0; if(months&&paidCount>months)paidCount=months;
    const dueDay=Math.min(31,Math.max(0,parseInt($('#lDue').value)||0))||null;
    const note=$('#lNote').value.trim();
    if(editing){Object.assign(loan,{title,monthly,months,paidCount,dueDay,currency:cur,note});await put('loans',loan)}
    else{await put('loans',{id:uid(),title,monthly,months,paidCount,dueDay,currency:cur,note,order:loans.length,createdAt:Date.now()})}
    loans=(await getAll('loans')).sort((a,b)=>(a.order??0)-(b.order??0));
    closeModal();render();toast(editing?'Güncellendi':'Kredi eklendi');
  };
  if(editing)$('#lDelete').onclick=async()=>{await del('loans',loan.id);loans=loans.filter(x=>x.id!==loan.id);closeModal();render();toast('Kredi silindi')};
}

function formatIban(iban){
  const s=(iban||'').toUpperCase().replace(/[^A-Z0-9]/g,'');
  return s.replace(/(.{4})/g,'$1 ').trim();
}

function bankTile(bk){
  const accs=bankAccounts.filter(a=>a.bankId===bk.id);
  const sahsi=accs.filter(a=>a.owner==='sahsi').length;
  const ticari=accs.filter(a=>a.owner==='ticari').length;
  return `<div class="card-tile" data-bkenter="${bk.id}" style="--c:${bk.color||'#4B5B6B'}">
    <div class="ct-top">
      <span class="ct-bank">${esc(bk.name)}</span>
      <button class="ct-menu" data-bkmenu="${bk.id}" aria-label="Seçenekler">${svgDots()}</button>
    </div>
    ${accs.length
      ?`<div class="ct-row"><span>${accs.length} hesap</span><span>${sahsi} şahsi · ${ticari} ticari</span></div>`
      :`<div class="ct-row"><span>Hesap yok — içine girip ekle</span></div>`}
  </div>`;
}

function openBankMenu(id,anchor){
  const bk=banks.find(x=>x.id===id);if(!bk)return;
  popover.innerHTML=`<button data-edit>${svgGear()} Düzenle</button><div class="sep"></div><button class="del" data-del>🗑 Sil</button>`;
  placePopover(anchor);popover.classList.add('show');
  popover.querySelector('[data-edit]').onclick=()=>{closePopover();openBankModal(bk)};
  popover.querySelector('[data-del]').onclick=async()=>{
    closePopover();
    for(const a of bankAccounts.filter(x=>x.bankId===bk.id))await del('bankAccounts',a.id);
    bankAccounts=bankAccounts.filter(x=>x.bankId!==bk.id);
    await del('banks',bk.id);banks=banks.filter(x=>x.id!==bk.id);
    render();toast('Banka silindi');
  };
}

function printBankAccounts(){
  const dateStr=new Date().toLocaleDateString('tr-TR',{day:'numeric',month:'long',year:'numeric'});
  const sections=banks.map(bk=>{
    const accs=bankAccounts.filter(a=>a.bankId===bk.id);
    if(!accs.length)return '';
    const accRows=accs.map(a=>`
      <tr>
        <td>${esc(a.label||'—')}</td>
        <td class="iban">${esc(formatIban(a.iban))}</td>
        <td><span class="tag ${a.owner==='ticari'?'ticari':'sahsi'}">${a.owner==='ticari'?'Ticari':'Şahsi'}</span></td>
      </tr>`).join('');
    return `
      <section>
        <h2>${esc(bk.name)} <span class="count">${accs.length} hesap</span></h2>

function calendarHTML(c){
  const y=calMonth.getFullYear(), m=calMonth.getMonth();
  const startDow=(new Date(y,m,1).getDay()+6)%7; // Pazartesi=0
  const daysInMonth=new Date(y,m+1,0).getDate();
  const todayKey=dailyKey(new Date());
  const monthName=calMonth.toLocaleDateString('tr-TR',{month:'long',year:'numeric'});
  const wd=['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'];
  let cells='';
  for(let i=0;i<startDow;i++)cells+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dk=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const n=notes[noteId(c.id,dk)];
    const isToday=dk===todayKey;
    cells+=`<button class="cal-cell ${n?'hasnote':''} ${isToday?'today':''}" data-day="${dk}">
      <span class="cal-num">${d}</span>
      ${n?`<span class="cal-note">${esc(n.text)}</span>`:''}
    </button>`;
  }
  return `
  <div class="cal">
    <div class="cal-head">
      <button class="cal-nav" data-cal="prev" aria-label="Önceki ay">${svgBack()}</button>
      <span class="cal-title">${monthName}</span>
      <button class="cal-nav" data-cal="next" aria-label="Sonraki ay"><span style="transform:scaleX(-1);display:inline-flex">${svgBack()}</span></button>
    </div>
    <div class="cal-grid cal-wd">${wd.map(w=>`<div class="cal-wlbl">${w}</div>`).join('')}</div>
    <div class="cal-grid">${cells}</div>
  </div>`;
}

function weekStrip(c){
  const today=new Date();
  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date(today);d.setDate(today.getDate()-i);
    const list=compRoutines(c.id,'daily');
    const done=list.filter(r=>completions[`${r.id}__${dailyKey(d)}`]).length;
    const total=list.length;
    let cls='';
    if(total>0){ if(done>=total)cls='full'; else if(done>0)cls='part'; }
    if(i===0)cls+=' today';
    const dd=d.toLocaleDateString('tr-TR',{weekday:'short'}).replace('.','');
    days.push(`<div class="dchip ${cls}" title="${d.toLocaleDateString('tr-TR')} · ${done}/${total}"><span class="dd">${dd}</span><span class="dot"></span></div>`);
  }
  return `<div class="week-strip"><span class="wlbl eyebrow">Son 7 gün</span>${days.join('')}</div>`;
}

function routineItem(r){
  const done=isDone(r);
  const rec=done?completions[`${r.id}__${periodKeyFor(r.freq)}`]:null;
  let meta='';
  if(done&&rec){const t=new Date(rec.completedAt);meta=`Tamamlandı · ${t.toLocaleDateString('tr-TR',{day:'numeric',month:'short'})} ${t.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'})}`}
  return `
  <div class="ritem ${done?'done':''}" data-routine="${r.id}">
    <button class="check" data-check="${r.id}" aria-label="Tamamlandı işaretle">${svgCheck()}</button>
    <div class="rbody">
      <div class="rtitle">${esc(r.title)}</div>
      ${r.note?`<div class="rnote">${esc(r.note)}</div>`:''}
      ${meta?`<div class="rmeta">${meta}</div>`:''}
    </div>
    <button class="rmenu-btn" data-menu="${r.id}" aria-label="Seçenekler">${svgDots()}</button>
  </div>`;
}

function openRoutineModal(cid,freq,routine){

      <h3>${editing?'Düzenle':'Rutin ekle'}</h3>

      </div>
      <div class="field">
        <label>Sıklık</label>
        <div class="seg" id="rFreq">
          ${FREQ.map(f=>`<button data-f="${f.key}" class="${f.key===curFreq?'on':''}">${f.label}</button>`).join('')}
        </div>
      </div>
      <div class="field">
        <label>Not (isteğe bağlı)</label>
        <textarea id="rNote" rows="2" placeholder="Detay, hatırlatma...">${editing?esc(routine.note):''}</textarea>

        <button class="btn primary" id="rSave">${editing?'Kaydet':'Ekle'}</button>
      </div>
    </div>`;
  overlay.classList.add('show');
  setTimeout(()=>$('#rTitle').focus(),60);
  modal.querySelectorAll('#rFreq button').forEach(b=>b.onclick=()=>{
    curFreq=b.dataset.f;modal.querySelectorAll('#rFreq button').forEach(x=>x.classList.toggle('on',x===b));
  });
  $('#rCancel').onclick=closeModal;
  $('#rSave').onclick=async()=>{
    const title=$('#rTitle').value.trim();if(!title){$('#rTitle').focus();return}
    const note=$('#rNote').value.trim();
    if(editing){
      routine.title=title;routine.note=note;routine.freq=curFreq;
      await put('routines',routine);
      const i=routines.findIndex(x=>x.id===routine.id);routines[i]=routine;
    }else{
      const order=compRoutines(cid,curFreq).length;
      const nr={id:uid(),companyId:cid,freq:curFreq,title,note,order,createdAt:Date.now()};
      await put('routines',nr);routines.push(nr);
    }

    await del('routines',routine.id);routines=routines.filter(x=>x.id!==routine.id);
    closeModal();render();toast('Rutin silindi');
  };
}

function renderCardDetail(){

  const accent=cd.color||'#3A3733';

  const cur=cd.currency||'TRY';
  const limit=Number(cd.limit||0), debt=Number(cd.debt||0);

  const usePct=limit>0?Math.min(100,Math.round(debt/limit*100)):0;

  const inst=installments.filter(i=>i.cardId===cd.id);
  const active=inst.filter(i=>(i.paidCount||0)<i.months);

  const remainTotal=inst.reduce((s,i)=>s+(Number(i.total||0)/i.months)*(i.months-(i.paidCount||0)),0);

  const instHTML = inst.length ? inst.map(i=>installmentItem(i,cur)).join('') :
    `<div class="empty mini"><div style="font-weight:500;color:var(--ink)">Taksit yok</div><div style="font-size:13px;margin-top:4px">Bu kartla aldığın taksitli alışverişleri ekle; kaç taksit kaldığını ve aylık yükü gör.</div></div>`;

  <div class="cv" style="--accent:${accent}">

    <div class="cd-hero" style="--c:${accent}">

      </div>
      <div class="ct-num">•••• •••• •••• ${esc(cd.last4||'••••')}</div>
      ${limit>0?`<div class="ct-bar"><i style="width:${usePct}%"></i></div>
      <div class="ct-row"><span>Borç <b>${fmtMoney(debt,cur)}</b></span><span>Limit ${fmtMoney(limit,cur)} · Kalan ${fmtMoney(avail,cur)}</span></div>`:'<div class="ct-row"><span>Limit girilmedi — düzenle ile ekleyebilirsin</span></div>'}
      <div class="ct-foot">
        <span class="ct-due">Son ödeme ayın ${cd.dueDay||'—'}'i${cd.statementDay?` · kesim ${cd.statementDay}'i`:''}</span>
        <button class="ct-paid ${paid?'on':''}" data-cpay="${cd.id}">${paid?'✓ Bu ay ödendi':'Ödendi işaretle'}</button>
      </div>
    </div>

    <div class="cd-stats">
      <div class="stat"><div class="snum">${active.length}</div><div class="slbl">aktif taksit</div></div>
      <div class="stat"><div class="snum">${fmtMoney(monthlyBurden,cur)}</div><div class="slbl">aylık taksit yükü</div></div>
      <div class="stat"><div class="snum">${fmtMoney(remainTotal,cur)}</div><div class="slbl">kalan taksit borcu</div></div>
    </div>

    <div class="home-sec-head" style="margin-top:30px">
      <span class="eyebrow">Taksitler</span>
      <button class="sec-add" data-addinst>${svgPlus()} Taksit ekle</button>

  $('[data-cardedit]').addEventListener('click',()=>openCardModal(cd));
  $('[data-cpay]').addEventListener('click',async()=>{await togglePaid(cd.id,'card',cd.debt);render()});
  const ai=$('[data-addinst]');if(ai)ai.addEventListener('click',()=>openInstallmentModal(cd.id,null));

function installmentItem(i,cur){
  const months=i.months, paidCount=i.paidCount||0;
  const monthly=Number(i.total||0)/months;
  const pct=Math.round(paidCount/months*100);
  const done=paidCount>=months;
  const remaining=months-paidCount;
  let nextLabel='';
  if(!done && i.startMonth){
    const [yy,mm]=i.startMonth.split('-').map(Number);
    nextLabel=new Date(yy, mm-1+paidCount, 1).toLocaleDateString('tr-TR',{month:'long',year:'numeric'});
  }
  return `<div class="inst ${done?'done':''}">
    <div class="inst-main">
      <div class="inst-top">
        <span class="inst-title">${esc(i.title)}</span>
        <button class="rmenu-btn" data-imenu="${i.id}" aria-label="Seçenekler">${svgDots()}</button>
      </div>
      <div class="inst-meta">
        <span class="imono">${fmtMoney(monthly,cur)} × ${months} ay</span>
        <span class="idot">·</span><span class="imono">Toplam ${fmtMoney(i.total,cur)}</span>
        ${!done&&nextLabel?`<span class="idot">·</span><span class="imono next">Sonraki: ${nextLabel}</span>`:''}
      </div>
      <div class="inst-bar"><i style="width:${pct}%"></i></div>
      <div class="inst-foot">
        <span class="iprog">${done?'✓ Tamamlandı':`${paidCount}/${months} taksit ödendi`}</span>
        ${!done?`<span class="iremain">Kalan ${fmtMoney(monthly*remaining,cur)}</span>`:''}
      </div>
    </div>
    <div class="inst-actions">
      ${paidCount>0?`<button class="istep" data-iundo="${i.id}" aria-label="Geri al">−</button>`:''}
      ${!done?`<button class="istep pay" data-ipay="${i.id}">Taksit öde</button>`:''}
    </div>
  </div>`;
}

async function changeInstallment(id,delta){

  i.paidCount=Math.min(i.months,Math.max(0,(i.paidCount||0)+delta));
  await put('installments',i);render();
}

function chequeRow(c){
  const done=!!c.done;
  const cur=c.currency||'TRY';
  const isVerilen=c.type==='verilen';
  let status='',scls='';
  if(done){status='Kapandı';scls='paid'}
  else if(c.dueDate){
    const today=new Date();today.setHours(0,0,0,0);
    const d=new Date(c.dueDate+'T00:00:00');
    const diff=Math.round((d-today)/86400000);
    if(diff<0){status=`${-diff} gün gecikti`;scls='overdue'}
    else if(diff===0){status='Bugün';scls='soon'}
    else{status=`${diff} gün kaldı`;scls=diff<=5?'soon':''}
  }
  const dateLabel=c.dueDate?new Date(c.dueDate+'T00:00:00').toLocaleDateString('tr-TR',{day:'numeric',month:'short',year:'numeric'}):'';
  return `<div class="bill cheque ${done?'paid':''}">
    <button class="bcheck" data-qpay="${c.id}" aria-label="Kapat">${svgCheck()}</button>
    <div class="bbody" data-qedit="${c.id}">
      <div class="bname">${esc(c.title)} <span class="qtag ${isVerilen?'verilen':'alinan'}">${isVerilen?'Ödenecek':'Tahsil'}</span></div>
      <div class="bmeta">
        ${dateLabel?`<span class="bday">${dateLabel}</span>`:''}
        ${c.bank?`<span class="btag genel">${esc(c.bank)}</span>`:''}
        ${status?`<span class="bstat ${scls}">${status}</span>`:''}
      </div>
    </div>
    <div class="bamt ${isVerilen?'neg':'pos'}">${isVerilen?'−':'+'}${fmtMoney(c.amount,cur)}</div>
    <button class="rmenu-btn" data-qmenu="${c.id}" aria-label="Seçenekler">${svgDots()}</button>
  </div>`;
}

function renderChequesPage(){

  pending.forEach(c=>{const s=sums[c.currency||'TRY']=sums[c.currency||'TRY']||{verilen:0,alinan:0};s[c.type==='verilen'?'verilen':'alinan']+=Number(c.amount||0)});
  const chips=Object.entries(sums).map(([cur,s])=>`
