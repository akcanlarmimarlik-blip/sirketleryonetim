    ${s.alinan?`<span class="sumchip paid"><em>tahsil</em> ${fmtMoney(s.alinan,cur)}</span>`:''}`).join('');
  const rows= sorted.length? sorted.map(chequeRow).join('') :
    `<div class="empty"><div class="ico">◌</div><div style="font-weight:500;color:var(--ink)">Henüz çek yok</div><div style="font-size:13px;margin-top:4px">Verdiğin ve aldığın çekleri vade tarihiyle ekle; gününü ve tutarını gör.</div></div>`;

    <button class="backbtn" data-back>${svgBack()} Genel bakış</button>

        <div class="eyebrow" style="color:var(--accent)">Vade takibi</div>

    ${chips?`<div class="billtotals" style="border-top:none;padding-top:0;margin-top:0;margin-bottom:18px">${chips}</div>`:''}

  const aq=$('[data-addcheque]');if(aq)aq.addEventListener('click',()=>openChequeModal(null));
  document.querySelectorAll('[data-qpay]').forEach(b=>b.addEventListener('click',async e=>{e.stopPropagation();await toggleCheque(b.dataset.qpay);render()}));

  bindFooter();

async function exportData(){
  const data={version:5,exportedAt:new Date().toISOString(),companies,routines,completions:Object.values(completions),notes:Object.values(notes),bills,cards,payments:Object.values(payments),installments,cheques,banks,bankAccounts,loans};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`rutin-yedek-${dailyKey(new Date())}.json`;a.click();
  toast('Yedek indirildi');
}
function importData(){
  const inp=document.createElement('input');inp.type='file';inp.accept='application/json';
  inp.onchange=()=>{
    const f=inp.files[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=async()=>{
      try{
        const data=JSON.parse(reader.result);
        if(!data.companies||!data.routines){toast('Geçersiz yedek dosyası');return}
        if(!confirm('Mevcut tüm veriler bu yedekle değiştirilecek. Devam edilsin mi?'))return;
        await clearStore('companies');await clearStore('routines');await clearStore('completions');await clearStore('notes');
        await clearStore('bills');await clearStore('cards');await clearStore('payments');await clearStore('installments');await clearStore('cheques');
        await clearStore('banks');await clearStore('bankAccounts');await clearStore('loans');
        for(const c of data.companies)await put('companies',c);
        for(const r of data.routines)await put('routines',r);
        for(const cm of (data.completions||[]))await put('completions',cm);
        for(const nt of (data.notes||[]))await put('notes',nt);
        for(const bl of (data.bills||[]))await put('bills',bl);
        for(const cd of (data.cards||[]))await put('cards',cd);
        for(const pm of (data.payments||[]))await put('payments',pm);
        for(const it of (data.installments||[]))await put('installments',it);
        for(const ch of (data.cheques||[]))await put('cheques',ch);
        for(const bk of (data.banks||[]))await put('banks',bk);
        for(const ba of (data.bankAccounts||[]))await put('bankAccounts',ba);
        for(const ln of (data.loans||[]))await put('loans',ln);
        await loadAll();view={page:'home',companyId:null,section:null,cardId:null,bankId:null,homeTab:view.homeTab||'overview'};render();toast('Yedek yüklendi');
      }catch(e){toast('Dosya okunamadı')}
    };
    reader.readAsText(f);
  };
  inp.click();
}
async function resetToday(){
  if(!confirm('Bugün için işaretlenen tüm günlük rutinler sıfırlansın mı?'))return;
  const pk=dailyKey(new Date());
  const toDel=Object.values(completions).filter(c=>c.freq==='daily'&&c.periodKey===pk);
  for(const c of toDel){delete completions[c.id];await del('completions',c.id)}
  render();toast('Bugün sıfırlandı');
}

/* ---------- Toast ---------- */
let toastT;
function toast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2000);
}

/* ---------- PIN kilit + hareketsizlik zamanlayıcısı ---------- */
const LOCK_PIN='5555';
const LOCK_MS=3*60*1000; // 3 dakika
const REM_KEY='pinRemUntil';
let lockTimer=null, pinBuffer='', lastActivity=0, rememberMe=false;
const lockscreen=document.getElementById('lockscreen');

function isLocked(){return lockscreen.classList.contains('show')}
function updatePinDots(){document.querySelectorAll('#pinDots span').forEach((d,i)=>d.classList.toggle('on',i<pinBuffer.length))}
function lockApp(){
  clearTimeout(lockTimer);
  pinBuffer='';updatePinDots();
  document.getElementById('pinDots').classList.remove('err');
  closeModal();closePopover();
  lockscreen.classList.add('show');
}
function unlockApp(){
  lockscreen.classList.remove('show');
  resetIdle();
}
function resetIdle(){
  if(isLocked())return;
  clearTimeout(lockTimer);
  lockTimer=setTimeout(lockApp,LOCK_MS);
}
function onActivity(){
  if(isLocked())return;
  const now=Date.now();
  if(now-lastActivity<1500)return;
  lastActivity=now;resetIdle();
}
let _pinLastT=0,_pinChecking=false;
function pinInput(d){
  const now=Date.now();
  if(now-_pinLastT<60)return; // çift dokunuşu engelle
  _pinLastT=now;
  if(_pinChecking||pinBuffer.length>=4)return;
  pinBuffer+=d;updatePinDots();
  if(pinBuffer.length===4){
    _pinChecking=true;
    setTimeout(()=>{
      if(pinBuffer===LOCK_PIN){
        if(rememberMe) localStorage.setItem(REM_KEY, Date.now()+7*24*3600*1000);
        unlockApp();
      }
      else{
        const card=document.getElementById('lockCard');
        card.classList.add('shake');document.getElementById('pinDots').classList.add('err');
        setTimeout(()=>{card.classList.remove('shake');document.getElementById('pinDots').classList.remove('err');pinBuffer='';updatePinDots();_pinChecking=false;},420);
        return;
      }
      _pinChecking=false;
    },110);
  }
}
/* ---------- Touch ID (WebAuthn) ---------- */
const TID_KEY='tidCredId';
async function tidAvailable(){
  try{
    if(location.protocol!=='https:'&&location.hostname!=='localhost')return false;
    return await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
  }catch{return false}
}
async function tidRegister(){
  const cred=await navigator.credentials.create({publicKey:{
    challenge:crypto.getRandomValues(new Uint8Array(32)),
    rp:{name:'Şirketler Paneli',id:location.hostname},
    user:{id:crypto.getRandomValues(new Uint8Array(16)),name:'kullanici',displayName:'Kullanıcı'},
    pubKeyCredParams:[{alg:-7,type:'public-key'},{alg:-257,type:'public-key'}],
    authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required',residentKey:'preferred'},
    timeout:60000
  }});
  const id=btoa(String.fromCharCode(...new Uint8Array(cred.rawId)));
  localStorage.setItem(TID_KEY,id);return id;
}
async function tidAuth(credId){
  await navigator.credentials.get({publicKey:{
    challenge:crypto.getRandomValues(new Uint8Array(32)),
    allowCredentials:[{id:Uint8Array.from(atob(credId),c=>c.charCodeAt(0)),type:'public-key'}],
    userVerification:'required',
    rpId:location.hostname,
    timeout:60000
  }});
}
async function tryTouchId(){
  try{
    let id=localStorage.getItem(TID_KEY);
    if(!id)id=await tidRegister();
    await tidAuth(id);
    unlockApp();
  }catch(e){
    if(e.name==='InvalidStateError'){
      // kayıtlı credential geçersiz, sil ve yeniden kaydet
      localStorage.removeItem(TID_KEY);
    }
    console.log('Touch ID:',e.message);
  }
}

function setupLock(){
  function addPinTap(el,fn){
    let touched=false;
    el.addEventListener('touchend',e=>{e.preventDefault();touched=true;fn();},{passive:false});
    el.addEventListener('click',()=>{if(touched){touched=false;return;}fn();});
  }
  document.querySelectorAll('#pinPad button[data-d]').forEach(b=>addPinTap(b,()=>pinInput(b.dataset.d)));
  const back=document.querySelector('#pinPad [data-back]');
  if(back)addPinTap(back,()=>{pinBuffer=pinBuffer.slice(0,-1);updatePinDots()});
  // donanım klavyesi
  window.addEventListener('keydown',e=>{
    if(!isLocked())return;
    if(/^[0-9]$/.test(e.key))pinInput(e.key);
    else if(e.key==='Backspace')pinBuffer=pinBuffer.slice(0,-1),updatePinDots();
  });
  // Beni Hatırla butonu
  const remBtn=document.getElementById('remMeBtn');
  if(remBtn){
    function addPinTapRem(el,fn){ let t=false; el.addEventListener('touchend',e=>{e.preventDefault();t=true;fn();},{passive:false}); el.addEventListener('click',()=>{if(t){t=false;return;}fn();}); }
    addPinTapRem(remBtn,()=>{
      rememberMe=!rememberMe;
      remBtn.classList.toggle('on',rememberMe);
      remBtn.textContent=rememberMe?'✓ 7 gün hatırlanacak':'📱 Beni hatırla (7 gün)';
    });
  }
  // Touch ID butonu
  tidAvailable().then(ok=>{
    const wrap=document.getElementById('touchWrap');
    const btn=document.getElementById('touchBtn');
    if(ok&&wrap&&btn){wrap.classList.add('visible');btn.addEventListener('click',tryTouchId)}
  });
  // hareket = sayaç sıfırla
  ['mousemove','mousedown','keydown','touchstart','touchmove','scroll','click','wheel'].forEach(ev=>
    window.addEventListener(ev,onActivity,{passive:true}));
}

function parseFirebaseConfig(raw){
  if(!raw)return null;
  try{return JSON.parse(raw)}catch(e){}
  const m=raw.match(/\{[\s\S]*\}/);
  if(m){
    try{return JSON.parse(m[0])}catch(e){}
    try{return (new Function('return ('+m[0]+')'))()}catch(e){}
  }
  return null;
}

async function initFirebase(){
  cloudReady=false;
  const cfg=parseFirebaseConfig(cloudCfg.config);
  if(!cfg||!cfg.projectId)throw new Error('Geçersiz yapılandırma');
  const appMod=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
  const authMod=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
  const fsMod=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
  const appI=appMod.initializeApp(cfg);
  const authI=authMod.getAuth(appI);
  await authMod.signInAnonymously(authI);
  let fsDb;
  try{
    if(fsMod.initializeFirestore && fsMod.persistentLocalCache){
      fsDb=fsMod.initializeFirestore(appI,{localCache:fsMod.persistentLocalCache()});
    } else {
      fsDb=fsMod.getFirestore(appI);
    }
  }catch(e){
    try{ fsDb=fsMod.getFirestore(appI); }catch(e2){}
  }
  fb={fs:fsMod, db:fsDb};
  cloudReady=true;
}

function cloudReminderItems(){
  const out=[];
  const now=new Date(), y=now.getFullYear(), m=now.getMonth();
  const pad=n=>String(n).padStart(2,'0');
  const dim=new Date(y,m+1,0).getDate();
  cheques.forEach(c=>{
    if(!c.dueDate)return;
    out.push({key:'cheque_'+c.id,title:c.title||'Çek',sub:(c.type==='verilen'?'Çek · ödenecek':'Çek · tahsil'),dueDate:c.dueDate,amount:Number(c.amount||0)||null,currency:c.currency||'TRY',done:!!c.done});
  });
  bills.forEach(b=>{
    if(!b.dueDay)return;
    const dd=`${y}-${pad(m+1)}-${pad(Math.min(b.dueDay,dim))}`;
    out.push({key:'bill_'+b.id,title:b.name,sub:'Fatura',dueDate:dd,amount:null,currency:null,done:isPaid(b.id)});
  });
  cards.forEach(cd=>{
    if(!cd.dueDay)return;
    const dd=`${y}-${pad(m+1)}-${pad(Math.min(cd.dueDay,dim))}`;
    out.push({key:'card_'+cd.id,title:(cd.bank||'Kart')+' ekstresi',sub:'Kredi kartı',dueDate:dd,amount:Number(cd.debt||0)||null,currency:cd.currency||'TRY',done:isPaid(cd.id)});
  });
  return out;
}

async function syncCloud(silent){
  if(!cloudReady){if(!silent)toast('Önce bulut ayarlarını gir');return}
  try{
    const {collection,doc,setDoc,deleteDoc,getDocs}=fb.fs;
    const items=cloudReminderItems();
    const keys=new Set(items.map(i=>i.key));
    for(const it of items){
      await setDoc(doc(fb.db,'reminders',it.key),
        {title:it.title,sub:it.sub,dueDate:it.dueDate,amount:it.amount,currency:it.currency,done:it.done,updatedAt:Date.now()},
        {merge:true});
    }
    const snap=await getDocs(collection(fb.db,'reminders'));
    for(const d of snap.docs){ if(!keys.has(d.id)) await deleteDoc(d.ref); }
    if(!silent)toast('Bulut senkronlandı');
  }catch(e){ if(!silent)toast('Senkron hatası'); console.error(e); }
}

function startCloudLoop(){
  clearInterval(cloudTimer);
  cloudTimer=setInterval(()=>{ if(cloudReady){ cloudPushAll(); syncCloud(true); } }, 5*60*1000);
  document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible'&&cloudReady) cloudPushAll(); },{once:false});
}

/* ---------- TAM VERİ SENKRONU (cihazlar arası ortak kullanım) ---------- */
let deviceId='';
let pushTimer=null, remotePullTimer=null, listenersOn=false;

function clean(items){ try{ return JSON.parse(JSON.stringify(items)); }catch(e){ return items; } }

function schedulePush(){
  if(!cloudReady)return;
  clearTimeout(pushTimer);
  pushTimer=setTimeout(()=>{ cloudPushAll(); syncCloud(true); }, 1500);
}

async function cloudPushAll(){
  if(!cloudReady)return;
  try{
    const {doc,setDoc}=fb.fs;
    for(const s of SYNC_STORES){
      const items=clean(await getAll(s));
      await setDoc(doc(fb.db,'appdata',s),{items,updatedAt:Date.now(),deviceId},{merge:false});
    }
  }catch(e){console.error('push',e)}
}

async function cloudPullAll(){
  if(!cloudReady)return;
  suppressPush=true;
  try{
    const {doc,getDoc}=fb.fs;
    for(const s of SYNC_STORES){
      const snap=await getDoc(doc(fb.db,'appdata',s));
      if(snap.exists()){
        const items=snap.data().items||[];
        await clearStore(s);
        for(const it of items) await put(s,it);
      }
    }
    await loadAll();
    await seedPersonalCompany();
    await loadAll();
    render();
  }catch(e){console.error('pull',e)}
  finally{ suppressPush=false; }
}

function scheduleRemotePull(){
  clearTimeout(remotePullTimer);
  remotePullTimer=setTimeout(cloudPullAll,900);
}

function attachCloudListeners(){
  if(listenersOn||!cloudReady)return;
  const {doc,onSnapshot}=fb.fs;
  for(const s of SYNC_STORES){
    onSnapshot(doc(fb.db,'appdata',s),snap=>{
      if(!snap.exists())return;
      const d=snap.data();
      if(d.deviceId===deviceId)return; // kendi yazdığımız değişiklik, atla
      scheduleRemotePull();
    });
  }
  listenersOn=true;
}

// İlk bağlantı: bulutta veri varsa onu al (ortak kaynak), yoksa yereli buluta yükle.
async function cloudConnect(){
  await initFirebase();
  if(!deviceId){
    const dv=await getOne('settings','device');
    deviceId=(dv&&dv.data&&dv.data.id)||(Date.now().toString(36)+Math.random().toString(36).slice(2,8));
    await put('settings',{id:'device',data:{id:deviceId}});
  }
  const {doc,getDoc}=fb.fs;
  const compSnap=await getDoc(doc(fb.db,'appdata','companies'));
  const cloudHasData = compSnap.exists() && (compSnap.data().items||[]).length>0;
  if(cloudHasData){ await cloudPullAll(); }
  else { await cloudPushAll(); }
  attachCloudListeners();
  syncCloud(true);
}

function waSend(text,cfg){
  const c=cfg||waCfg;
  return new Promise(res=>{
    try{
      const phone=(c.phone||'').replace(/[^0-9]/g,'');
      if(!phone||!c.apikey)return res(false);
      const url=`https://api.callmebot.com/whatsapp.php?phone=${encodeURIComponent(phone)}&text=${encodeURIComponent(text)}&apikey=${encodeURIComponent(c.apikey)}`;
      fetch(url,{mode:'no-cors'}).then(()=>res(true)).catch(()=>{
        const img=new Image();img.onload=()=>res(true);img.onerror=()=>res(true);img.src=url;
      });
    }catch(e){res(false)}
  });
}

function reminderText(it){
  let when;
  if(it.days<0)when=`${-it.days} gün GECİKTİ`;
  else if(it.days===0)when='bugün son gün';
  else if(it.days===1)when='yarın';
  else when=`${it.days} gün kaldı`;
  const amt=it.amount!=null?` (${fmtMoney(it.amount,it.currency||'TRY')})`:'';
  return `⏰ ${it.sub}: ${it.title}${amt} — ${when}. Tamamlayınca hatırlatma durur.`;
}

async function checkReminders(){
  if(!waCfg.enabled||!waCfg.phone||!waCfg.apikey)return;
  const now=Date.now();
  const lead=waCfg.leadDays||3;
  const gapMs=(waCfg.intervalHours||5)*3600*1000;
  const items=upcomingItems().filter(i=>i.days!==null && i.days<=lead);
  const activeKeys=new Set(items.map(i=>i.key));
  let changed=false;
  // tamamlananları (artık listede olmayanları) temizle → tekrarda sıfırdan başlar
  Object.keys(remState).forEach(k=>{if(!activeKeys.has(k)){delete remState[k];changed=true}});
  for(const it of items){
    const last=remState[it.key]||0;
    if(now-last>=gapMs){
      const ok=await waSend(reminderText(it));
      if(ok){remState[it.key]=now;changed=true}
    }
  }
  if(changed)await saveRem();
}

    else lockApp();

    const localCompanies = await getAll('companies');
    const isNewDevice = localCompanies.length === 0;

    if(isNewDevice && cloudCfg.enabled && cloudCfg.config){

        await cloudConnect();

      }catch(e){ console.error('Bulut bağlantısı:', e); }

})();
